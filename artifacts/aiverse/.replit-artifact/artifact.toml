kind = "web"
previewPath = "/"
title = "AIVerse 2.0"
version = "1.0.0"
id = "artifacts/aiverse"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21752

[services.development]
run = "pnpm --filter @workspace/aiverse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/aiverse", "run", "build" ]
publicDir = "artifacts/aiverse/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21752"
BASE_PATH = "/"
